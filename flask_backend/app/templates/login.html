<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Herons Hub - UMak</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='images/favicon.svg') }}">
    
    <!-- Custom Login Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
    
    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body class="login-page">

    <!-- Background Decoration -->
    <div class="bg-wrapper">
        <img src="{{ url_for('static', filename='svg/Background.svg') }}" alt="" class="bg-svg">
    </div>

    <!-- Top Left Header - Unified Logo from Navbar -->
    <header class="login-header">
        <a href="{{ url_for('core.home') }}">
            <img src="{{ url_for('static', filename='images/Navbar_Logo_New.png') }}" alt="University of Makati Herons' Hub" class="header-logo opacity-0">
        </a>
    </header>

    <!-- Main Wrapper for Absolute Centering -->
    <div class="login-wrapper">
        <main class="login-card opacity-0">
            <!-- Heron Logo -->
            <img src="{{ url_for('static', filename='svg/Herons_Hub_Logo.svg') }}" alt="Herons' Hub" class="card-logo">
            
            <!-- Title Group -->
            <p class="card-subtitle">A UMak-exclusive student community</p>

            <!-- Action Button -->
            <button class="btn-google" onclick="window.location.href='{{ url_for('auth.login') }}'">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#fff"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.64l-3.57-2.77c-.99.66-2.26 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#fff" opacity="0.8"/>
                    <path d="M5.84 14.12c-.22-.66-.35-1.39-.35-2.12s.13-1.46.35-2.12V7.04H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.96l3.66-2.84z" fill="#fff" opacity="0.6"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.04l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#fff" opacity="0.9"/>
                </svg>
                Continue with Google
            </button>

            <!-- Subtext -->
            <p class="login-subtext">Log in with your @umak.edu.ph</p>
        </main>
    </div>

    <!-- Global Footer -->
    <footer class="login-footer">
        <p class="footer-disclaimer opacity-0">
            This hub is exclusively for the UMak community. Please use your official <strong>@umak.edu.ph</strong> account. Personal email addresses and unauthorized access will be denied to ensure the security and privacy of our academic community.
        </p>
    </footer>

    <!-- Custom Script -->
    <script src="{{ url_for('static', filename='js/login.js') }}"></script>
</body>
</html>
