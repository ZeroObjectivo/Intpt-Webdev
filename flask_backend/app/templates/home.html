{% extends "base.html" %}

{% block title %}Herons' Hub - University of Makati{% endblock %}

{% block content %}
<!-- Full-Page Background Container -->
<div class="fixed inset-0 w-screen h-screen overflow-hidden -z-10 bg-umak-blue">
    <!-- Background Image -->
    <img src="{{ url_for('static', filename='images/Main_Frame.png') }}" 
         alt="UMak Campus Background" 
         class="w-full h-full object-cover object-center scale-105">
    <!-- Overlay for depth and contrast -->
    <div class="absolute inset-0 bg-black/35 backdrop-blur-[1px]"></div>
</div>

<!-- Centered Branding Overlay -->
<div class="branding-overlay">
    <div class="branding-content animate-zoom-in flex flex-col items-center">
        <img src="{{ url_for('static', filename='images/Herons_Hub.png') }}" 
             alt="Herons' Hub - Community for everyone" 
             class="branding-logo">
        
        {% if user %}
        <div class="mt-8 bg-white/10 backdrop-blur-md p-6 rounded-2xl border border-white/20 text-center animate-fade-up">
            <h2 class="text-3xl md:text-4xl font-bold text-white mb-2">Welcome back, {{ user.user_metadata.full_name }}!</h2>
            <p class="text-white/80 text-lg">Ready to see what's happening at UMak today?</p>
            <div class="mt-6 flex gap-4 justify-center">
                <a href="{{ url_for('core.dashboard') }}" class="bg-umak-yellow text-umak-blue px-8 py-3 rounded-xl font-bold hover:scale-105 transition-transform shadow-lg">Enter Dashboard</a>
                <a href="{{ url_for('core.dashboard') }}?filter=my-posts" class="bg-white/10 text-white px-8 py-3 rounded-xl font-bold hover:bg-white/20 transition-all border border-white/30">View Your Posts</a>
            </div>
        </div>
        {% endif %}
    </div>
</div>

<style>
    /* Precision Centering for Logo */
    .branding-overlay {
        position: absolute;
        top: 45%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 100%;
        padding: 0 1.5rem;
        display: flex;
        justify-content: center;
        pointer-events: auto; /* Changed to allow clicking buttons */
        z-index: 20;
    }

    .branding-content {
        width: 100%;
        display: flex;
        justify-content: center;
    }

    .branding-logo {
        width: 85%;
        max-width: 700px;
        height: auto;
        object-fit: contain;
        filter: drop-shadow(0 15px 30px rgba(0,0,0,0.6));
    }
    
    .animate-fade-up {
        animation: fade-up 1s ease-out 0.5s both;
    }

    @keyframes fade-up {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    @media (min-width: 768px) {
        .branding-logo {
            width: 65%;
        }
    }

    @media (min-width: 1024px) {
        .branding-logo {
            width: 55%;
        }
    }

    @keyframes zoom-in {
        from { opacity: 0; transform: scale(0.97); }
        to { opacity: 1; transform: scale(1); }
    }
    .animate-zoom-in {
        animation: zoom-in 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    
    /* Global Lock for landing page */
    html, body {
        height: 100%;
        overflow: hidden;
    }

    /* Make Navbar Transparent on Home Page */
    nav {
        background-color: transparent !important;
        box-shadow: none !important;
        position: absolute !important;
        width: 100%;
        z-index: 50;
    }
</style>
{% endblock %}
