<!-- Heron Support Modal -->
<div id="supportModal" class="fixed inset-0 bg-black/70 flex items-center justify-center hidden backdrop-blur-[4px] transition-all duration-300" style="z-index: 99999 !important;">
    <div class="bg-white rounded-[2.5rem] w-full max-w-[480px] mx-4 shadow-2xl animate-in fade-in zoom-in duration-200 overflow-hidden" style="z-index: 100000 !important;">
        <!-- Header -->
        <div class="px-8 py-6 border-b border-slate-50 flex items-center justify-between bg-slate-50/30">
            <div>
                <h2 class="text-xl font-black text-slate-900 tracking-tight">Heron Support</h2>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-0.5">Direct line to UMak Admins</p>
            </div>
            <button onclick="closeSupportModal()" class="w-10 h-10 flex items-center justify-center bg-white text-slate-400 hover:text-slate-600 rounded-2xl shadow-sm border border-slate-100 transition-all active:scale-90">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>

        <form id="supportForm" onsubmit="submitSupportTicket(event)" class="p-8 space-y-6">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            
            <div class="space-y-2">
                <label class="block text-[10px] font-black uppercase text-slate-400 ml-1 tracking-widest">Subject</label>
                <input type="text" name="subject" required placeholder="What do you need help with?"
                       class="w-full px-5 py-4 rounded-2xl border-none bg-slate-50 text-sm font-bold text-slate-700 outline-none focus:ring-2 focus:ring-umak-blue/20 transition-all">
            </div>

            <div class="space-y-2">
                <label class="block text-[10px] font-black uppercase text-slate-400 ml-1 tracking-widest">Detailed Message</label>
                <textarea name="message" required rows="5" 
                          class="w-full px-5 py-4 rounded-2xl border-none bg-slate-50 text-sm font-medium text-slate-600 outline-none focus:ring-2 focus:ring-umak-blue/20 transition-all resize-none"
                          placeholder="Describe your issue or feedback in detail..."></textarea>
            </div>

            <div class="pt-2">
                <button type="submit" id="supportSubmitBtn"
                        class="w-full py-4 bg-umak-blue text-white rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-umak-blue-bright transition-all shadow-lg shadow-blue-900/20 active:scale-95 flex items-center justify-center gap-2">
                    <span>Send Message</span>
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 5l7 7-7 7M5 5l7 7-7 7"></path></svg>
                </button>
            </div>
            
            <p class="text-[9px] text-center text-slate-400 font-bold uppercase tracking-tighter italic">Admins usually respond within 24 hours via system notifications.</p>
        </form>
    </div>
</div>

<script>
function openSupportModal() {
    const modal = document.getElementById('supportModal');
    if (modal) {
        modal.classList.remove('hidden');
        modal.classList.add('flex');
        document.body.style.overflow = 'hidden';
    }
}

function closeSupportModal() {
    const modal = document.getElementById('supportModal');
    if (modal) {
        modal.classList.add('hidden');
        modal.classList.remove('flex');
        document.body.style.overflow = '';
    }
}

async function submitSupportTicket(event) {
    event.preventDefault();
    const form = event.target;
    const submitBtn = document.getElementById('supportSubmitBtn');
    const formData = new FormData(form);
    const data = {
        subject: formData.get('subject'),
        message: formData.get('message')
    };

    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span>Sending...</span>';

    try {
        const response = await fetch('/support/ticket/create', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': '{{ csrf_token() }}'
            },
            body: JSON.stringify(data)
        });
        
        const result = await response.json();
        
        if (result.status === 'created') {
            if (window.createToast) window.createToast('Support ticket sent successfully!', 'success');
            form.reset();
            closeSupportModal();
        } else {
            throw new Error(result.error || 'Failed to send');
        }
    } catch (e) {
        console.error(e);
        if (window.createToast) window.createToast('Error: ' + e.message, 'error');
    } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<span>Send Message</span>';
    }
}

// Close on backdrop click
document.getElementById('supportModal')?.addEventListener('click', (e) => {
    if (e.target === e.currentTarget) closeSupportModal();
});
</script>
