<!-- Image Modal (Refined Minimalist Theater View) -->
<div id="imageModal" class="image-modal" onclick="closeImageModal(event)">
    <div class="modal-container" onclick="event.stopPropagation()">
        <!-- Main Content (Image View) -->
        <div class="modal-main-view">
            <!-- Image Controls HUD -->
            <div class="modal-controls">
                <button class="modal-control-btn" id="zoomOutBtn" onclick="zoomImage(-0.2)" title="Zoom Out">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 12H4"></path></svg>
                </button>
                <button class="modal-control-btn" id="zoomInBtn" onclick="zoomImage(0.2)" title="Zoom In">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                </button>
                <button class="modal-control-btn" id="resetZoomBtn" onclick="resetZoomState()" title="Reset Zoom">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                </button>
            </div>

            <!-- Navigation Buttons -->
            <button class="modal-nav modal-prev" id="modalPrevBtn" onclick="navigateModal(-1)" title="Previous Image">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path></svg>
            </button>
            <button class="modal-nav modal-next" id="modalNextBtn" onclick="navigateModal(1)" title="Next Image">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"></path></svg>
            </button>

            <!-- Image Viewport -->
            <div class="modal-image-wrapper" id="modalImageWrapper">
                <img id="modalImg" src="" alt="Full size post content" class="modal-image">
            </div>
        </div>

        <!-- Sidebar (Post Details & Comments) -->
        <div class="modal-side-panel shadow-xl">
            <button class="modal-close" onclick="closeImageModal(event)" title="Close (Esc)">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
            
            <div class="modal-post-header">
                <img id="modalUserAvatar" src="" alt="Post author avatar">
                <div class="flex-1">
                    <div class="flex items-center gap-2">
                        <h4 id="modalUserName" class="text-slate-900"></h4>
                        <div id="modalUserCollegeContainer" class="flex items-center gap-2">
                            <span class="text-slate-400 text-[10px] font-black leading-none mx-0.5">•</span>
                            <span id="modalUserCollege" class="badge"></span>
                        </div>
                    </div>
                    <div class="flex items-center gap-2 mt-1">
                        <span id="modalPostTime"></span>
                        <span class="text-slate-400 text-[10px] font-black leading-none mx-0.5">•</span>
                        <span id="modalCategoryBadge" class="badge"></span>
                    </div>
                </div>
            </div>

            <div class="px-8 mb-6">
                <div id="modalUserProfileEmbed" class="p-4 rounded-2xl bg-slate-50 border border-slate-100 transition-all hover:bg-slate-100/50">
                    <div id="modalUserProgram" class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Community Contributor</div>
                    <a id="modalUserProfileLink" href="#" class="inline-flex items-center gap-1.5 mt-2 text-[11px] font-bold text-slate-600 hover:text-slate-900 transition-all">
                        View Profile
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 5h6m0 0v6m0-6L10 14"></path></svg>
                    </a>
                </div>
            </div>

            <div class="modal-post-content overflow-y-auto custom-scrollbar">
                <p id="modalPostText" class="text-slate-700 leading-relaxed font-medium"></p>
                
                <div id="modalEmbedContainer" class="modal-embed hidden mt-6 rounded-2xl overflow-hidden shadow-sm">
                    <iframe id="modalEmbedIframe" src="" title="Embedded content" loading="lazy" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen referrerpolicy="strict-origin-when-cross-origin"></iframe>
                </div>
                <div id="modalDynamicDetails" class="mt-6 flex flex-wrap gap-2"></div>
            </div>

            <div class="modal-post-actions">
                <button class="modal-action-btn group" id="modalLikeBtn" onclick="toggleLike(currentPost.id, this)">
                    <svg class="w-5 h-5 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
                    <span>Like</span>
                </button>
                <button class="modal-action-btn group" onclick="document.getElementById('commentTextarea').focus()">
                    <svg class="w-5 h-5 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
                    <span>Comment</span>
                </button>
            </div>

            <div class="modal-comments-section flex-1 custom-scrollbar">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-6">Replies</p>
                <div id="modalCommentsList" class="space-y-4">
                    <div class="text-center py-8">
                        <p class="text-xs text-slate-300 italic">No entries yet.</p>
                    </div>
                </div>
            </div>

            <div class="modal-comment-input">
                <form id="modalCommentForm" onsubmit="submitComment(event)" class="flex gap-4 items-end">
                    <div class="flex-1 relative">
                        <textarea id="commentTextarea" rows="1" class="w-full" placeholder="Share your thoughts..."></textarea>
                        <button type="submit" class="absolute right-3 bottom-3 text-slate-400 hover:text-umak-blue transition-all hover:scale-110">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 5l7 7-7 7M5 5l7 7-7 7"></path></svg>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Custom Confirmation Modal (Refined) -->
<div id="confirmModal" class="confirm-modal" onclick="closeConfirmModal()">
    <div class="confirm-content bg-white p-8 max-w-md w-full" onclick="event.stopPropagation()">
        <h3 id="confirmTitle" class="text-xl font-black text-slate-900 mb-2">Confirm Action</h3>
        <p id="confirmMessage" class="text-slate-500 mb-8 font-medium leading-relaxed">Are you sure you want to proceed with this action?</p>
        <div class="flex justify-end gap-4">
            <button onclick="closeConfirmModal()" class="px-6 py-2.5 rounded-xl text-sm font-bold text-slate-400 hover:text-slate-600 transition-colors">Cancel</button>
            <button id="confirmActionBtn" class="px-8 py-2.5 rounded-xl text-sm font-black bg-slate-900 text-white hover:bg-black transition-all shadow-lg shadow-slate-200">Confirm</button>
        </div>
    </div>
</div>
