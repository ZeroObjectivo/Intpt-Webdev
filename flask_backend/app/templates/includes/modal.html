<!-- Image Modal (Facebook Theater View) -->
<div id="imageModal" class="image-modal" onclick="closeImageModal(event)">
    <div class="modal-container">
        <div class="modal-main-view">
            <div class="modal-controls">
                <button id="zoomToggleBtn" class="modal-control-btn" onclick="toggleZoom(event)" title="Zoom In/Out">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7"></path></svg>
                </button>
                <button class="modal-control-btn" onclick="toggleFullScreen(event)" title="Full Screen">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg>
                </button>
            </div>
            
            <button id="modalPrev" class="modal-nav modal-prev" onclick="changeModalImage(-1, event)">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            </button>
            
            <div id="modalImageWrapper" class="modal-image-wrapper" onclick="handleImageClick(event)">
                <img id="modalImage" class="modal-image" src="" alt="Expanded post image">
            </div>
            
            <button id="modalNext" class="modal-nav modal-next" onclick="changeModalImage(1, event)">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
            </button>
        </div>

        <div class="modal-side-panel relative">
            <button class="modal-close" onclick="closeImageModal(event)">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
            <div class="modal-post-header">
                <img id="modalUserAvatar" src="" alt="Post author avatar">
                <div>
                    <h4 id="modalUserName"></h4>
                    <span id="modalPostTime"></span>
                </div>
            </div>

            <div class="modal-post-content">
                <div id="modalCategoryBadge" class="inline-block px-2 py-0.5 rounded-full text-[9px] font-black uppercase tracking-widest mb-3"></div>
                <p id="modalPostText"></p>
                <div id="modalDynamicDetails" class="mt-4 space-y-2"></div>
            </div>

            <div class="modal-post-actions">
                <button class="modal-action-btn">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
                    <span>Like</span>
                </button>
                <button class="modal-action-btn">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
                    <span>Comment</span>
                </button>
            </div>

            <div class="modal-comments-section flex-1 overflow-y-auto">
                <p class="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-4">Comments</p>
                <div id="modalCommentsList" class="space-y-4">
                    <div class="text-center py-8">
                        <p class="text-xs text-slate-400 italic">No comments yet. Be the first to reply!</p>
                    </div>
                </div>
            </div>

            <div class="modal-comment-input border-t border-slate-50 p-4">
                <form id="modalCommentForm" onsubmit="submitComment(event)" class="flex gap-3">
                    <img src="{{ user.avatar_url if user is defined and user.avatar_url else url_for('static', filename='images/Logo.png') }}" alt="Your avatar" class="w-8 h-8 rounded-full">
                    <div class="flex-1 relative">
                        <textarea id="commentTextarea" rows="1" class="w-full bg-slate-50 rounded-xl px-4 py-2 text-xs font-medium border-none focus:ring-2 focus:ring-blue-500/20 outline-none resize-none" placeholder="Write a comment..."></textarea>
                        <button type="submit" class="absolute right-2 top-1/2 -translate-y-1/2 text-umak-blue hover:text-blue-900 transition-colors">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 5l7 7-7 7M5 5l7 7-7 7"></path></svg>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Custom Confirmation Modal -->
<div id="confirmModal" class="confirm-modal" onclick="closeConfirmModal(event)">
    <div class="confirm-content bg-white rounded-3xl p-8 shadow-2xl max-w-sm w-full mx-4 transform transition-all duration-300 scale-90 opacity-0">
        <div class="text-center">
            <div class="w-16 h-16 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg class="w-8 h-8 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                </svg>
            </div>
            <h3 id="confirmTitle" class="text-xl font-black text-slate-800 mb-2">Delete Post?</h3>
            <p id="confirmMessage" class="text-slate-500 text-sm font-medium mb-8">Are you sure you want to delete this? This action cannot be undone.</p>
            
            <div class="flex gap-3">
                <button onclick="closeConfirmModal()" class="flex-1 px-6 py-3 rounded-2xl text-sm font-bold text-slate-400 hover:text-slate-600 hover:bg-slate-50 transition-all">
                    Cancel
                </button>
                <button id="confirmActionBtn" class="flex-1 px-6 py-3 rounded-2xl text-sm font-bold bg-red-500 text-white shadow-lg shadow-red-200 hover:bg-red-600 hover:-translate-y-0.5 transition-all">
                    Delete
                </button>
            </div>
        </div>
    </div>
</div>
